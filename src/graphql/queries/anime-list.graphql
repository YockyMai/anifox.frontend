fragment AnimeListEntry on AnimeListEntry {
  id
  userId
  animeId
  endedAt
  episodesWatched
  startedAt
  updatedAt
  status
  rating {
    id
    rating
  }
}

fragment AnimeListEntryWithAnime on AnimeListEntry {
  id
  userId
  animeId
  anime {
    ...AnimeLite
  }
  endedAt
  episodesWatched
  startedAt
  updatedAt
  status
  rating {
    id
    rating
  }
}
query AnimeList($userId: String!) {
  animeList(userId: $userId) {
    list {
      ...AnimeListEntryWithAnime
    }
  }
}
